<html>
    <head>
        <title>colorez</title>
        <style>
            html,body{
                width: 100%;
                height: 100%;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
    
        
        <script type="application/javascript">
        
            let c = 360;
            let s = 100;
            let b = 50;
            setInterval(colorez,1);
            function colorez()
            {
                if(c < 0){
                   c = 360;
                   s--;
                }
                if(s < 0){
                   s = 100;
                   b--;
                }
                 if(b < 0){
                   b = 100;
                }
                c--;
                document.body.style.backgroundColor = "hsl("+c+","+s+"%,"+b+"%)";
            }
            
            
            
        </script>
    </body>
</html>
