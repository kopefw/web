<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<script src="http://code.jquery.com/jquery-1.4.4.js"></script>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
<style>
body{ margin:0px;}
</style>
</head>

<body>
<div id="uno"></div>
<script>
var a, b;
var c = 0;
var cb, cc;
var d = false;
function uno(){
d = false;

b = $(window).height();
//b = b.replace(/\D/g,'');
//b = parseInt(b, 10);

a = $("body").css("width");
a = a.replace(/\D/g,'');
a = parseInt(a, 10);

$('#uno').css("height", b)
$('#uno').css("width", 0)

$('#uno').animate({
    width: a
  }, 2000, function() {
   c++;
   d = true;
   $('div').css("width", 0);
  });
cc= c%255;
cb = cc + 1;
$("#uno").css("background-color", "rgb("+cb+","+cb+","+cb+")");
$("body").css("background-color", "rgb("+cc+","+cc+","+cc+")");
};
uno();
setInterval("uno()", 2010);
</script>
</body>
</html>
