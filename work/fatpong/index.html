<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<script src="jquery-1.8.3.min.js"></script>
<script>
var anchoD, altoD;
var inicioX = 0, inicioY = 0;
var ancho, alto;
var anchoB, altoB;
var d = 1, d1 = 1;	
function movball(){
	 inicioX = inicioX + d ;
	 inicioY = inicioY + d1;
	 ancho = $("#area2").width();
	 alto = $("#area2").height();
	 anchoB = $("#ball").width();
	 altoB = $("#ball").height();
	 if(inicioX > ancho - anchoB){
		 d = d * -1;
		 }
	 if(inicioX < 0){
		 d = d * -1;
		 }
	if(inicioY > alto - altoB){
		 d1 = d1 * -1;
		 }
	 if(inicioY < 0){
		 d1 = d1 * -1;
		 }
	$("#ball").css("top", inicioY+"px");
	$("#ball").css("left", inicioX+"px");	 
	};

var altoF = 1,altoF1, altoF2;	 
	 $(document).keypress(function(x){
		altoF1 = $("#contenedor").height();
		altoF2 = $("#p2").height();
		
		if(altoF > 0){
			if (x.keyCode  == 111){
					altoF = altoF - 10;
					$("#p2").css("top",altoF+"px")
			}}
			
		if(altoF < altoF1 - altoF2){
			if (x.keyCode  == 108){
					altoF = altoF + 10;
					$("#p2").css("top",altoF+"px")
			}}
     }); 
var altoE = 1,altoE1, altoE2;	 
	 $(document).keypress(function(z){
		 
		altoE1 = $("#contenedor").height();
		altoE2 = $("#p1").height();
		
		if(altoE > 0){
			if (z.keyCode  == 119){
					
					altoE = altoE - 10;
					$("#p1").css("top",altoE+"px")
			}}
			
		if(altoE < altoE1 - altoE2){
			if (z.keyCode  == 115){
					altoE = altoE + 10;
					$("#p1").css("top",altoE+"px")
			}}
     }); 

$(document).ready(function() {
    anchoD = $(document).width();
	altoD = $(document).height();
	$("#contenedor").css("width", anchoD+"px");
	$("#contenedor").css("height", altoD+"px");
	$("#contenedor > div").css("height", altoD+"px");
	setInterval("movball()", 40);
	});



</script>
<title>FatPong</title>
</head>

<body style="margin:0px; padding:0px; overflow:hidden; background-color:#000">
<div id="contenedor" style="overflow:hidden;">
	<div id="area1" style="width:5%; float:left; position:relative;">
    	<div id="p1" style="width:100%; height:90%; background-color: #FFF; position:absolute"></div>
    </div>
    <div id="area2" style="width:90%; float:left; position:relative;">
    	<div id="ball" style="width:97%; height:97%; background-color:#FFF; position:absolute; color:#000; font-family:Arial, Helvetica, sans-serif; font-size:10px">
        	<P>Player-1 = Up: W, Down : S</P>
            <P>Player-2 = Up: O, Down : L</P>
        
        </div>
    </div>
    <div id="area3" style="width:5%; float:left;">
    	<div id="p2" style="width:100%; height:90%; background-color: #FFF; position:absolute"></div>
    </div>



</div>
</body>
</html>
